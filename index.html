<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <title>EXE File Remover Security Bot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      html, body { min-height: 100%; margin: 0; background: #0f172a; color: #f8fafc; }
      .boot-fallback { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .boot-card { width: 100%; max-width: 390px; border: 1px solid rgba(148,163,184,.22); border-radius: 24px; background: rgba(15,23,42,.92); padding: 22px; box-shadow: 0 20px 60px rgba(0,0,0,.35); }
      .boot-logo { width: 52px; height: 52px; border-radius: 18px; display: grid; place-items: center; background: rgba(59,130,246,.16); color: #93c5fd; font-size: 28px; }
      .boot-title { margin: 14px 0 6px; font-size: 22px; font-weight: 900; }
      .boot-text { margin: 0; color: #cbd5e1; line-height: 1.45; font-size: 14px; }
      .boot-skeleton { height: 14px; margin-top: 18px; border-radius: 999px; background: linear-gradient(90deg, rgba(148,163,184,.18), rgba(148,163,184,.36), rgba(148,163,184,.18)); background-size: 220% 100%; animation: boot 1.15s infinite linear; }
      .boot-skeleton.short { width: 62%; }
      @keyframes boot { from { background-position: 220% 0; } to { background-position: -220% 0; } }
    </style>
  </head>
  <body>
    <div id="root">
      <main class="boot-fallback">
        <section class="boot-card">
          <div class="boot-logo">🛡️</div>
          <h1 class="boot-title">EXE File Remover</h1>
          <p class="boot-text">Connecting to Telegram…</p>
          <div class="boot-skeleton"></div>
          <div class="boot-skeleton short"></div>
        </section>
      </main>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
